name: Build Eco For Folia (自动适配Folia)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 🔥 关键：构建 Folia 版本（不是普通版！）
      - name: Build Eco For Folia
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -Pfoilafix -x test

      # 自动找 Folia 专用 JAR
      - name: Find Built JAR
        run: find . -name "*all.jar"

      # 自动发布到 Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "**/*.jar"
          tag_name: "eco-folia-build-${{ github.sha }}"
          name: "Folia 专用 Eco 插件"
          body: "✅ 适配 Folia 服务端 | 可直接放入 plugins 使用"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}